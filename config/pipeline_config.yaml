# === Configuracion general ===
device: "cuda"  # "cpu" si no hay GPU. En Colab default cuda.
seed: 42
image_size: [224, 224]
log_level: "INFO"

# === Paths (sobreescribibles por colab.setup_paths) ===
paths:
  raw_data: "data/raw"
  preprocessed_data: "data/preprocessed"
  images_pants: "data/images/pants"
  images_tops: "data/images/tops"
  splits: "data/splits"
  models: "models"
  outputs: "outputs"

# === CSV sources ===
data:
  pants_csv: "data/preprocessed/pants_1.csv"
  tops_csv: "data/preprocessed/tops_1.csv"
  download:
    workers: 8
    timeout: 15
    max_retries: 3
    backoff_factor: 1.5
  splits:
    train_ratio: 0.70
    val_ratio: 0.15
    test_ratio: 0.15
    stratify_col: "color_family"
    min_samples_per_class: 3

# === Modulo 1: Segmentacion ===
segmentation:
  model_name: "mattmdjaga/segformer_b2_clothes"
  confidence_threshold: 0.5
  target_categories:
    - "upper_body"
    - "lower_body"
    - "full_body"
  routing:
    upper_body_label: "tops"
    lower_body_label: "pants"
    full_body_fallback: "tops"

# === Modulo 2: Extraccion de color ===
color:
  n_clusters: 5
  color_space: "LAB"
  min_cluster_ratio: 0.05
  dominant_threshold: 0.3
  color_naming: true
  pattern_classifier:
    enabled: true
    classes: ["liso", "rayas", "cuadros", "estampado", "floral", "geometrico"]

# === Modulo 3a: Clasificador PANTS ===
pants:
  backbone: "google/vit-base-patch16-224"
  checkpoint: "models/best_pants.pth"
  heads:
    color_family:
      classes: ["neutrals_dark", "neutrals_light", "blues", "reds", "greens",
                "yellows", "purples", "oranges", "browns", "metallics", "otro"]
      weight: 1.0
    pattern:
      classes: ["liso", "rayas", "cuadros", "estampado", "geometrico", "otro"]
      weight: 1.0
    fit_silhouette:
      classes: ["slim", "regular", "relaxed", "wide", "skinny", "otro"]
      weight: 0.9
    fabric_content:
      classes: ["algodon", "denim", "sintetico", "punto", "lino", "lana", "cuero", "otro"]
      weight: 0.8
    dressing_syle:
      classes: ["minimalista", "clasico", "casual", "sport", "formal", "streetwear", "otro"]
      weight: 0.7
    waist_rise:
      classes: ["mid_rise", "high_rise", "low_rise", "otro"]
      weight: 0.6
  training:
    epochs: 15
    batch_size: 32
    learning_rate: 3.0e-4
    weight_decay: 0.01
    freeze_backbone_epochs: 3
    label_smoothing: 0.1
    use_class_weights: true
    early_stopping_patience: 4
    augmentation:
      horizontal_flip: true
      color_jitter: true
      random_crop: true
      random_rotation: 10

# === Modulo 3b: Clasificador TOPS ===
tops:
  backbone: "google/vit-base-patch16-224"
  checkpoint: "models/best_tops.pth"
  heads:
    color_family:
      classes: ["neutrals_dark", "neutrals_light", "blues", "reds", "greens",
                "yellows", "purples", "oranges", "browns", "metallics", "otro"]
      weight: 1.0
    pattern:
      classes: ["liso", "rayas", "cuadros", "estampado", "floral", "geometrico", "otro"]
      weight: 1.0
    fit_silhouette:
      classes: ["slim", "regular", "relaxed", "oversized", "fitted", "otro"]
      weight: 0.9
    fabric_content:
      classes: ["algodon", "punto", "sintetico", "lino", "seda", "lana", "otro"]
      weight: 0.8
    dressing_syle:
      classes: ["minimalista", "clasico", "casual", "sport", "formal", "streetwear", "bohemio", "romantico", "otro"]
      weight: 0.7
    neck_style:
      classes: ["redondo", "en_v", "polo", "cuello_alto", "cuadrado", "barco", "sin_cuello", "otro"]
      weight: 0.6
  training:
    epochs: 15
    batch_size: 32
    learning_rate: 3.0e-4
    weight_decay: 0.01
    freeze_backbone_epochs: 3
    label_smoothing: 0.1
    use_class_weights: true
    early_stopping_patience: 4
    augmentation:
      horizontal_flip: true
      color_jitter: true
      random_crop: true
      random_rotation: 10

# === Pipeline (orquestador) ===
pipeline:
  run_segmentation: true
  run_color: true
  run_classification: true
  output_format: "json"
  save_intermediate: false
  confidence_threshold: 0.5

# === Colab ===
colab:
  drive_root: "/content/drive/MyDrive/master_ia/fashion-extraction"
  auto_setup: true
