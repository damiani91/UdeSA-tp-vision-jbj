# === Configuracion general ===
device: "cpu"  # "cuda" para GPU en Colab
seed: 42
image_size: [512, 512]  # Resize de entrada para todo el pipeline

# === Paths ===
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  splits: "data/splits"
  outputs: "outputs"
  models: "models"  # Checkpoints guardados

# === Modulo 1: Segmentacion ===
segmentation:
  model_name: "mattmdjaga/segformer_b2_clothes"
  confidence_threshold: 0.5
  # Categorias de prendas a segmentar
  target_categories:
    - "upper_body"
    - "lower_body"
    - "full_body"
    - "footwear"
    - "accessories"
  # Fine-tuning
  finetune:
    enabled: true
    dataset: "modanet"
    epochs: 15
    batch_size: 8
    learning_rate: 6.0e-5
    weight_decay: 0.01
    scheduler: "cosine"
    early_stopping_patience: 3

# === Modulo 2: Extraccion de color ===
color:
  n_clusters: 5
  color_space: "LAB"
  min_cluster_ratio: 0.05
  dominant_threshold: 0.3
  color_naming: true
  pattern_classifier:
    enabled: true
    classes: ["liso", "rayas", "cuadros", "estampado", "floral", "geometrico"]

# === Modulo 3: Clasificacion multi-task ===
classification:
  backbone: "google/vit-base-patch16-224"
  freeze_backbone_epochs: 3
  heads:
    tipo:
      classes: ["remera", "camisa", "campera", "pantalon", "jean", "short",
                "falda", "vestido", "buzo", "sweater", "blazer", "tapado",
                "zapatilla", "bota", "sandalia", "cartera", "mochila"]
      weight: 1.0
    estilo:
      classes: ["casual", "formal", "sport", "bohemio", "minimalista",
                "streetwear", "clasico", "romantico"]
      weight: 0.8
    fit:
      classes: ["slim", "regular", "oversized", "bodycon", "relaxed"]
      weight: 0.7
    cuello:
      classes: ["redondo", "en_v", "cuello_alto", "sin_cuello", "polo",
                "cuadrado", "barco"]
      weight: 0.5
    manga:
      classes: ["sin_manga", "manga_corta", "manga_larga", "manga_34",
                "tirantes"]
      weight: 0.5
    material:
      classes: ["algodon", "denim", "cuero", "punto", "seda", "lino",
                "sintetico", "lana"]
      weight: 0.6
  training:
    dataset: "deepfashion"
    epochs: 25
    batch_size: 32
    learning_rate: 3.0e-4
    weight_decay: 0.01
    scheduler: "cosine_with_warmup"
    warmup_ratio: 0.1
    label_smoothing: 0.1
    augmentation:
      horizontal_flip: true
      color_jitter: true
      random_crop: true
      random_rotation: 15

# === Modulo 4: Reconocimiento de marca ===
brand:
  detector:
    model: "yolov8m"
    confidence_threshold: 0.4
    iou_threshold: 0.5
  classifier:
    target_brands: ["nike", "adidas", "zara", "h&m", "uniqlo", "levis",
                    "lacoste", "tommy_hilfiger", "ralph_lauren", "gucci"]
    model: "efficientnet_b0"
  training:
    dataset: "logo2kplus"
    epochs: 20
    batch_size: 16
    learning_rate: 1.0e-3

# === Pipeline (orquestador) ===
pipeline:
  run_segmentation: true
  run_color: true
  run_classification: true
  run_brand: true
  output_format: "json"
  save_intermediate: true
  confidence_threshold: 0.5
